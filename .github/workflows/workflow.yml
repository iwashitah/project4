name: Build and Upload

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JFROG_CLI_LOG_LEVEL: DEBUG

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '8'

      - name: Cache Gradle files
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 👇 ここがクリーンな解決策
      - name: Generate Gradle 6 wrapper
        run: |
          wget https://services.gradle.org/distributions/gradle-6.9-bin.zip
          unzip -q gradle-6.9-bin.zip
          ./gradle-6.9/bin/gradle wrapper

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Verify Gradle version
        run: ./gradlew --version

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

      - name: Configure Gradle for Artifactory
        run: |
          jf gradle-config \
            --use-wrapper=true \
            --repo-resolve=gradle-virtual \
            --repo-deploy=gradle-virtual

      - name: Build and Upload
        run: jf ./gradlew clean uploadArchives
        env:
          ORG_GRADLE_PROJECT_repoUser: ${{ secrets.JF_USER }}
          ORG_GRADLE_PROJECT_repoPassword: ${{ secrets.JF_ACCESS_TOKEN }}
