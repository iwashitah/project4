name: "NPM test"
on: 
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JFROG_CLI_LOG_LEVEL: DEBUG
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v5
        with:
          disable-auto-build-publish: true
          disable-job-summary: false
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JFROG_CLI_BUILD_PROJECT: proj1
      - name: Run JFrog CLI
        run: |
          jf npmc --repo-deploy proj1-npm-virtual --repo-resolve proj1-npm-virtual
          jf npm publish
          jf rt u package.json example-repo-local/
