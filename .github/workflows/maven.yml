name: "Setup JFrog CLI Example"
on: 
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        with:
          disable-auto-build-publish: false
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JFROG_CLI_BUILD_PROJECT: proj1
      - name: Run JFrog CLI
        run: |
          jf mvnc --repo-deploy-releases proj1-maven-virtual --repo-deploy-snapshots proj1-maven-virtual --repo-resolve-releases proj1-maven-virtual --repo-resolve-snapshots proj1-maven-virtual
          #jf mvn clean install
          jf mvn install
          #jf rt bp
          jf bs
