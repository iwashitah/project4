name: "Setup JFrog CLI Example"
on: 
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JFROG_CLI_BUILD_PROJECT: proj1
      - name: Run JFrog CLI
        run: |
          jf mvnc --repo-deploy-releases maven-virtual --repo-deploy-snapshots maven-virtual --repo-resolve-releases maven-virtual --repo-resolve-snapshots maven-virtual
          jf mvn clean install
